# yaml-language-server: $schema=https://schema.zeabur.app/template.json
apiVersion: zeabur.com/v1
kind: Template
metadata:
  name: IPAM / Geofeed
spec:
  description: Full-stack IP address management system with hierarchical prefixes, IPv4 pools, authentication, and RFC 8805 Geofeed support.
  icon: https://cdn.zeabur.com/marketplace/mysql.svg
  readme: |
    # IPAM / Geofeed

    This template deploys two services:

    - MySQL database
    - IPAM web app, built from the root Dockerfile

    The app container runs both:

    - NestJS backend on internal port 3001
    - Next.js frontend on public port 3003

    Browser API requests use `/api` and are proxied by Next.js to the internal backend.

    After deployment:

    1. Open the app domain.
    2. Create the first administrator account.
    3. If you deploy manually, make sure `DATABASE_URL` points to MySQL.

    The app runs `npm run db:push` before starting the backend so the Prisma schema is synchronized automatically.
  services:
    - name: mysql
      icon: https://cdn.zeabur.com/marketplace/mysql.svg
      template: PREBUILT
      spec:
        source:
          image: mysql:8.0
        ports:
          - id: database
            port: 3306
            type: TCP
        volumes:
          - id: data
            dir: /var/lib/mysql
        env:
          MYSQL_DATABASE:
            default: ipam
            expose: true
          MYSQL_HOST:
            default: ${CONTAINER_HOSTNAME}
            expose: true
          MYSQL_PASSWORD:
            default: ${MYSQL_ROOT_PASSWORD}
            expose: true
          MYSQL_PORT:
            default: ${DATABASE_PORT}
            expose: true
          MYSQL_ROOT_PASSWORD:
            default: ${PASSWORD}
          MYSQL_USERNAME:
            default: root
            expose: true

    - name: app
      template: GIT
      dependencies:
        - mysql
      domainKey: APP_DOMAIN
      spec:
        source:
          source: ARBITRARY_GIT
          gitURL: https://github.com/InternetLink/IP-Management.git
          branch: main
          dockerfile: |
            FROM node:20-alpine

            WORKDIR /app

            COPY backend/package*.json ./backend/
            RUN cd backend && npm ci

            COPY frontend/package*.json ./frontend/
            RUN cd frontend && npm ci

            COPY backend ./backend
            COPY frontend ./frontend

            ARG NEXT_PUBLIC_API_URL=/api
            ENV NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}

            RUN cd backend && npm run db:generate && npm run build
            RUN cd frontend && npm run build

            ENV NODE_ENV=production
            ENV PORT=3003
            ENV BACKEND_PORT=3001
            ENV CORS_ORIGINS=http://localhost:3003

            EXPOSE 3003

            CMD ["sh", "-c", "cd /app/backend && for i in $(seq 1 30); do npm run db:push && break; echo 'Waiting for database...'; sleep 2; done && PORT=${BACKEND_PORT:-3001} node dist/main & cd /app/frontend && npm run start"]
          watchPaths:
            - /backend/**
            - /frontend/**
            - /Dockerfile
            - /zeabur.yaml
        ports:
          - id: web
            port: 3003
            type: HTTP
        env:
          PORT:
            default: "3003"
          BACKEND_PORT:
            default: "3001"
          NEXT_PUBLIC_API_URL:
            default: /api
          DATABASE_URL:
            default: mysql://${MYSQL_USERNAME}:${MYSQL_PASSWORD}@${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DATABASE}
          CORS_ORIGINS:
            default: https://${APP_DOMAIN}
          AUTH_SECRET:
            default: ${PASSWORD}
          AUTH_TOKEN_TTL_DAYS:
            default: "30"

localization:
  zh-CN:
    description: 支持层级 IP 前缀、IPv4 地址池、登录认证和 RFC 8805 Geofeed 的全栈 IP 地址管理系统。
    readme: |
      # IPAM / Geofeed

      该模板会部署两个服务：

      - MySQL 数据库
      - IPAM Web 应用，使用根目录 Dockerfile 构建

      应用容器内部同时运行：

      - NestJS 后端，内部端口 3001
      - Next.js 前端，公开端口 3003

      浏览器通过 `/api` 访问接口，由 Next.js 代理到内部后端。

      部署完成后：

      1. 打开应用域名。
      2. 创建第一个管理员账号。
      3. 如果手动部署，确认 `DATABASE_URL` 指向 MySQL。

      应用启动前会执行 `npm run db:push`，自动同步 Prisma schema。
